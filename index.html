<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ARISA — Precision Agronomy Intelligence. Sistem kecerdasan buatan komputasi tepi untuk pemantauan agronomi presisi oleh Tim SMK Marhas Margahayu pada OPSI 2026." />
    <meta name="keywords" content="ARISA, Agronomi, Kecerdasan Buatan, AI, Edge Computing, Pertanian Pintar, Smart Farming, SMK Marhas, OPSI 2026" />
    <meta name="author" content="Tim Peneliti SMK Marhas Margahayu" />
    <meta name="theme-color" content="#EAE4D9" />
    
    <script>
      (function() {
        if (!localStorage.getItem('arisa-theme-forced-dark-v2')) {
          localStorage.setItem('theme', 'dark');
          localStorage.setItem('arisa-theme-forced-dark-v2', 'true');
        }
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />

    <meta property="og:image" content="/hero-bg.webp" />
    
    <link rel="icon" type="image/webp" href="/assets/logo/logo-icon.webp" />
    <link rel="apple-touch-icon" href="/assets/logo/logo-icon.webp" />
